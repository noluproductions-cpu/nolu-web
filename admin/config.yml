backend:
  name: github
  repo: noluproductions-cpu/nolu-web
  branch: main
  commit_messages:
    create: 'CMS: Vytvořen nový příspěvek/položka'
    update: 'CMS: Aktualizován obsah - %{slug}'
    delete: 'CMS: Smazána položka'

media_folder: "GRAFIKA/LOGA/PNG"
public_folder: "GRAFIKA/LOGA/PNG"

local_backend: true

collections:
  - name: "portfolio"
    label: "Správa portfolia"
    files:
      - file: "data/projects.json"
        label: "Seznam projektů"
        name: "projects"
        description: "Zde můžete spravovat jednotlivé projekty zobrazené v portfoliu."
        fields:
          - name: "projects_list"
            label: "Projekty"
            widget: "list"
            summary: "{{title}}"
            fields:
              # Základní informace
              - { label: "Unikátní ID (slug, např: muj-projekt)", name: "id", widget: "string" }
              - { label: "Název projektu", name: "title", widget: "string" }
              - { label: "Kategorie / Tag (např. Správa sociálních sítí)", name: "tag", widget: "string" }
              
              # Skupina: Podrobnosti o projektu (Specs)
              - name: "specs"
                label: "⚙️ Podrobnosti projektu (Metadata)"
                widget: "object"
                fields:
                  - { label: "Doba trvání (např. 5 dní nebo > 1.5 roku)", name: "duration", widget: "string" }
                  - { label: "Náš tým (např. 2 kreativci)", name: "team", widget: "string" }
                  - { label: "Naše role (např. Kompletní PR vedení)", name: "role", widget: "string" }
              
              # Skupina: Obsah a média
              - name: "content"
                label: "📝 Popisky a Grafika"
                widget: "object"
                fields:
                  - { label: "Krátký popis (zobrazí se na kartě v mřížce)", name: "card_desc", widget: "text" }
                  - { label: "Detailní popis (zobrazí se po rozkliknutí ve vyskakovacím okně)", name: "desc", widget: "text" }
                  - { label: "Náhledový obrázek / logo (vyberte ze složky)", name: "image", widget: "image" }
              
              # Klíčové výstupy
              - name: "deliverables"
                label: "📌 Klíčové dodané výstupy (Seznam)"
                widget: "list"
                field: { label: "Výstup (např. Tvorba Reels)", name: "item", widget: "string" }
              
              # Výsledky / Statistiky
              - name: "stats"
                label: "📊 Statistiky / Výsledky"
                widget: "object"
                fields:
                  - { label: "Metrika 1 - Název (např. Celkový dosah)", name: "metric1", widget: "string" }
                  - { label: "Metrika 1 - Hodnota (např. 35K+)", name: "val1", widget: "string" }
                  - { label: "Metrika 2 - Název (např. Rychlost střihu)", name: "metric2", widget: "string" }
                  - { label: "Metrika 2 - Hodnota (např. < 4 hod)", name: "val2", widget: "string" }

      - file: "data/tech.json"
        label: "Naše technika"
        name: "tech"
        description: "Správa profesionálního vybavení (karty techniky a popisy v bublinách)."
        fields:
          - name: "tech_list"
            label: "Seznam techniky"
            widget: "list"
            summary: "{{name}} ({{category}})"
            fields:
              - { label: "Název zařízení (např. Canon EOS RP)", name: "name", widget: "string" }
              - { label: "Ikona (Emoji, např. 📷, 🎬, 🎙️, 📱, 💡)", name: "icon", widget: "string" }
              - { label: "Kategorie (např. Kamera, Audio, Osvětlení)", name: "category", widget: "string" }
              - { label: "Podrobný popis (zobrazí se po kliknutí na kartu)", name: "desc", widget: "text" }

      - file: "data/settings.json"
        label: "Nastavení webu a kontakty"
        name: "settings"
        description: "Upravte kontakty, texty v úvodní sekci (Hero) a sekci O nás."
        fields:
          - name: "site_settings"
            label: "Globální nastavení"
            widget: "object"
            fields:
              # Sekce: Kontakty
              - name: "contacts"
                label: "✉️ Kontakty a Status"
                widget: "object"
                fields:
                  - { label: "Status Badge (v hlavičce, např. Social & Content Studio)", name: "status_badge", widget: "string" }
                  - { label: "E-mail (např. noluproductions@gmail.com)", name: "email", widget: "string" }
                  - { label: "Zobrazované jméno Instagramu (např. @nolu.productions)", name: "instagram", widget: "string" }
                  - { label: "Odkaz na Instagram (včetně https://)", name: "instagram_url", widget: "string" }
              
              # Sekce: Hero
              - name: "hero"
                label: "👋 Úvodní sekce (Hero)"
                widget: "object"
                fields:
                  - { label: "Slogan (nadpis nad hlavním textem)", name: "tagline", widget: "string" }
                  - { label: "Hlavní nadpis - bílá část", name: "title_light", widget: "string" }
                  - { label: "Hlavní nadpis - barevná gradientová část", name: "title_colored", widget: "string" }
                  - { label: "Popis pod nadpisem", name: "description", widget: "text" }
              
              # Sekce: O nás
              - name: "about"
                label: "👥 Sekce O nás"
                widget: "object"
                fields:
                  - { label: "Hlavní nadpis", name: "heading", widget: "string" }
                  - { label: "První odstavec textu", name: "text1", widget: "text" }
                  - { label: "Druhý odstavec textu", name: "text2", widget: "text" }
                  - { label: "Zakladatel 1 - Jméno", name: "creator1_name", widget: "string" }
                  - { label: "Zakladatel 1 - Pozice", name: "creator1_title", widget: "string" }
                  - { label: "Zakladatel 2 - Jméno", name: "creator2_name", widget: "string" }
                  - { label: "Zakladatel 2 - Pozice", name: "creator2_title", widget: "string" }
